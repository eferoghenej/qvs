apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qvs-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: 18.8.0
      helm:
        releaseName: qoves-postgresql
        valueFiles:
          - $values/values/postgres-values.yaml

    - repoURL: https://github.com/eferoghenej/qvs.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: qvs-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true