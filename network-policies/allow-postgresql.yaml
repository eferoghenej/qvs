# Ingress half for: API -> PostgreSQL (see allow-db-egress.yaml for the egress
# half). Restricted to the API pods only, not any pod in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql
  namespace: qvs-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: qoves-postgresql
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - protocol: TCP
          port: 5432
