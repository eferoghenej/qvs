apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qvs-supply-chain-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/eferoghenej/qvs.git
    targetRevision: HEAD
    path: supply-chain/policies

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true