apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qvs-sealed-secrets
  namespace: argocd
spec:
  project: default

  source:
    repoURL: repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.17.3

    helm:
      values: |
        fullnameOverride: sealed-secrets-controller

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true