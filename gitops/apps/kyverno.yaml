apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qvs-kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://kyverno.github.io/kyverno/
      chart: kyverno
      targetRevision: 3.8.2
      helm:
        releaseName: kyverno
        valueFiles:
          - $values/values/kyverno-values.yaml

    - repoURL: https://github.com/eferoghenej/qvs.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true