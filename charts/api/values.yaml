replicaCount: 2

image:
  repository: qvs-api
  # Pinned tag (never :latest). Built locally into minikube's Docker daemon,
  # so IfNotPresent avoids a registry pull.
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

database:
  # Non-secret connection parameters live here; the password is pulled from
  # the existing Sealed Secret at runtime and interpolated into DATABASE_URL,
  # so no credential is ever committed to git.
  host: qoves-postgresql.qvs-app.svc.cluster.local
  port: 5432
  name: qvs
  user: qvs
  sslmode: disable
  passwordSecret:
    name: qvs-postgresql-credentials
    key: password

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: api.qvs.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}

tolerations: []

affinity: {}