apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qvs-postgresql-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/eferoghenej/qvs.git
    targetRevision: HEAD
    path: secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: qvs-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true